# =============================================================================
# TrotAssistant — configuration zeroclaw
# =============================================================================
# Lancement :  zeroclaw gateway --config ./zeroclaw/config.toml
#
# ⚠️ Les clés ci-dessous suivent le schéma documenté de zeroclaw mais celui-ci
#    évolue. Au premier déploiement, génère une base saine avec :
#        zeroclaw quickstart
#    puis reporte les blocs [channels.webhook.*] / [sop] / [agents.*] ci-dessous.
# =============================================================================

# --- Gateway HTTP/WS (reçoit le webhook OpenWA + les commandes Siri) ------------
[gateway]
# 127.0.0.1 = local seul. Pour piloter via Siri/iPhone (Tailscale ou même Wi-Fi),
# passe à "0.0.0.0", mets allow_public_bind = true, et garde require_pairing = true
# (bearer token). Cf. docs/siri-shortcuts.md
host = "127.0.0.1"
port = 42617
# allow_public_bind = true     # requis pour écouter sur 0.0.0.0 (accès iPhone)
require_pairing = false        # mets true (+ bearer) si la gateway est joignable depuis l'iPhone
# Délai max d'une requête /webhook : 30 s par défaut = trop court pour une réponse LLM un peu
# longue (timeout 408). On monte à 180 s. Réglage live : zeroclaw config set gateway.request_timeout_secs 180
request_timeout_secs = 180

# --- Provider LLM : Claude via abonnement (OAuth setup-token) -------------------
# Génère le token UNE FOIS (token sk-ant-oat*, pas de facturation API) :
#   zeroclaw auth setup-token --model-provider anthropic --profile default
# Pour utiliser une clé API classique à la place, ajoute  api_key = "sk-ant-..."
[providers.models.anthropic.home]
model = "claude-sonnet-4-5"
# auth_profile = "default"     # décommente si ta version le requiert explicitement

# --- Agent ---------------------------------------------------------------------
[agents.default]
identity       = "TrotAssistant"
model_provider = "anthropic.home"
risk_profile   = "supervised"  # autorise les réponses auto mais bloque le high-risk
workspace      = "~/trotassistant/workspace"

# --- Channel webhook entrant (OpenWA poste ici) --------------------------------
# Expose  POST  http://127.0.0.1:42617/webhook/whatsapp  (champ = listen_path en v0.8.x)
[channels.webhook.whatsapp]
listen_path = "/webhook/whatsapp"
secret      = "${TROT_WEBHOOK_SECRET}"   # vérifié via header (cf. .env)
# La v0.8.x peut aussi renvoyer la réponse directement (send_url / send_method) au lieu
# d'un appel HTTP dans la SOP — à explorer selon ton besoin.

# --- Skills --------------------------------------------------------------------
[skills]
enabled = true

# --- SOP engine (déclencheurs) -------------------------------------------------
[sop]
sops_dir               = "zeroclaw/sops"
default_execution_mode = "autonomous"   # réponses auto. Passe à "supervised"
                                         # pour valider chaque réponse à la main.

# --- Connecteurs MCP (outils externes) -----------------------------------------
[mcp]
enabled          = true
deferred_loading = true   # l'agent découvre les outils MCP à la demande

# Gmail (lire / chercher / envoyer des mails) via mcp-mail-server (Node, lancé par npx).
# Identifiants dans .env : GMAIL_USER + GMAIL_APP_PASSWORD (mot de passe d'application Gmail).
# Outils exposés : gmail__send_email, gmail__reply_to_email, gmail__search_by_sender,
#                  gmail__get_unseen_messages, gmail__search_since_date, etc.
[[mcp.servers]]
name      = "gmail"
transport = "stdio"
command   = "npx"
args      = ["-y", "mcp-mail-server"]
env       = { IMAP_HOST = "imap.gmail.com", IMAP_PORT = "993", IMAP_SECURE = "true", SMTP_HOST = "smtp.gmail.com", SMTP_PORT = "465", SMTP_SECURE = "true", EMAIL_USER = "${GMAIL_USER}", EMAIL_PASS = "${GMAIL_APP_PASSWORD}" }
